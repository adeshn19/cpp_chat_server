name: C++ Build CI

on:
  push:
    branches: [ main, feature_chat_server ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y g++

    - name: Build Server
      run: make -C server

    - name: Build Client
      run: make -C client

    - name: Run basic check
      run: echo "Build successful"